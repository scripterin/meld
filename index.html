<!DOCTYPE html>
<html class="light" lang="ro">

<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MELD - Home</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                "surface-container-lowest": "#ffffff",
                "on-tertiary-fixed": "#231b02",
                "surface-bright": "#fcf8fa",
                "outline": "#78767d",
                "on-surface": "#1c1b1d",
                "surface-container-low": "#f6f2f4",
                "on-tertiary-container": "#493f20",
                "inverse-surface": "#313032",
                "on-error": "#ffffff",
                "tertiary": "#695d3c",
                "inverse-on-surface": "#f4f0f2",
                "primary-container": "#1a1a2e",
                "surface-container": "#f1edef",
                "inverse-primary": "#c6c4df",
                "on-tertiary-fixed-variant": "#514627",
                "on-primary": "#ffffff",
                "error": "#ba1a1a",
                "surface-container-highest": "#e5e1e3",
                "primary-fixed": "#e2e0fc",
                "on-background": "#1c1b1d",
                "on-primary-fixed-variant": "#45455b",
                "on-error-container": "#93000a",
                "tertiary-fixed-dim": "#d5c59d",
                "surface-dim": "#ddd9db",
                "on-secondary": "#ffffff",
                "tertiary-container": "#b9aa83",
                "primary": "#00000b",
                "outline-variant": "#c8c5cd",
                "secondary": "#5e5d68",
                "tertiary-fixed": "#f2e1b7",
                "background": "#fcf8fa",
                "surface-tint": "#5d5c74",
                "on-secondary-fixed": "#1b1b23",
                "error-container": "#ffdad6",
                "on-primary-container": "#83829b",
                "on-surface-variant": "#47464c",
                "on-tertiary": "#ffffff",
                "secondary-fixed-dim": "#c8c5d1",
                "surface": "#fcf8fa",
                "secondary-container": "#e1deea",
                "on-secondary-container": "#63616c",
                "on-primary-fixed": "#1a1a2e",
                "secondary-fixed": "#e4e1ed",
                "surface-variant": "#e5e1e3",
                "primary-fixed-dim": "#c6c4df"
            },

            borderRadius: {
                DEFAULT: "0.25rem",
                lg: "0.5rem",
                xl: "0.75rem",
                full: "9999px"
            },

            spacing: {
                "margin-desktop": "32px",
                xl: "40px",
                md: "16px",
                base: "8px",

                gutter: "16px",

            fontFamily: {

<style>
body {
    background-color: #F7F6F3;
    -webkit-font-smoothing: antialiased;
}

.material-symbols-outlined {
    font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24;
}

.watermark-bg {
    background-repeat: no-repeat;
    background-position: center;
    background-size: 600px;
    opacity: 0.03;
    pointer-events: none;
}

.primary-cta-transition {
    transition:
    transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
    background-color 0.2s;
}

.primary-cta-transition:active {
    transform: scale(0.98);
}

/* Logo animation */
.logo {
    animation: floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo {
    0% {
        transform: translateY(0px);
    }

    50% {
        transform: translateY(-6px);
    }

    100% {
        transform: translateY(0px);
    }
}
</style>

</head>

<body class="font-body text-on-surface overflow-hidden">

<!-- Background -->
<div class="fixed inset-0 watermark-bg z-0"></div>

<!-- Main -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-margin-mobile">

    <!-- Center Column -->
    <div class="w-full max-w-[420px] flex flex-col items-center text-center space-y-xl">

        <!-- Brand -->
        <div class="flex flex-col items-center space-y-md">

            <!-- LOGO -->
            <img
                src="Meld.png"
                alt="MELD Logo"
                class="logo w-32 h-32 object-contain drop-shadow-[0_0_35px_rgba(0,0,0,0.15)] select-none"
            />

            <!-- Text -->
            <div class="space-y-xs">

                <h1 class="font-h1 text-[38px] leading-tight font-light tracking-[0.15em] text-primary select-none">
                    MELD
                </h1>

                <p class="font-body text-[14px] italic text-on-surface-variant opacity-70">
                    Combină elementele. Descoperă universul.
                </p>

            </div>
        </div>

        <!-- Buttons -->
        <div class="w-full space-y-lg pt-base">

            <!-- Play -->
            <button
                onclick="window.location.href='game.html'"
                class="primary-cta-transition w-full h-[56px] bg-primary-container text-on-primary rounded-lg flex items-center justify-center space-x-sm group hover:scale-[1.01]"
            >

                <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">
                    play_arrow
                </span>

                <span class="font-h2 text-h2 font-medium tracking-wide">
                    Joacă
                </span>

            </button>

        </div>
    </div>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const buttons = document.querySelectorAll('button');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            btn.classList.add('active:scale-95');
        });
    });

    // Smooth intro animation
    const mainCol = document.querySelector('main > div');

    mainCol.style.opacity = '0';
    mainCol.style.transform = 'translateY(15px)';
    mainCol.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';

    setTimeout(() => {
        mainCol.style.opacity = '1';
        mainCol.style.transform = 'translateY(0)';
    }, 100);

});
</script>

</body>
</html>
