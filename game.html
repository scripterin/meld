<!DOCTYPE html>
<html class="light" lang="ro">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MELD — Alchimie</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#ebe7e9",
              "on-secondary-fixed-variant": "#47464f",
              "surface-container-lowest": "#ffffff",
              "surface-bright": "#fcf8fa",
              "outline": "#78767d",
              "on-surface": "#1c1b1d",
              "surface-container-low": "#f6f2f4",
              "inverse-surface": "#313032",
              "on-error": "#ffffff",
              "inverse-on-surface": "#f4f0f2",
              "primary-container": "#1a1a2e",
              "surface-container": "#f1edef",
              "inverse-primary": "#c6c4df",
              "on-primary": "#ffffff",
              "error": "#ba1a1a",
              "surface-container-highest": "#e5e1e3",
              "on-background": "#1c1b1d",
              "on-error-container": "#93000a",
              "surface-dim": "#ddd9db",
              "on-secondary": "#ffffff",
              "primary": "#00000b",
              "outline-variant": "#c8c5cd",
              "secondary": "#5e5d68",
              "background": "#fcf8fa",
              "on-primary-container": "#83829b",
              "on-surface-variant": "#47464c",
              "on-tertiary": "#ffffff",
              "secondary-fixed-dim": "#c8c5d1",
              "surface": "#fcf8fa",
              "secondary-container": "#e1deea",
              "on-secondary-container": "#63616c",
              "on-primary-fixed": "#1a1a2e",
              "surface-variant": "#e5e1e3",
              "primary-fixed-dim": "#c6c4df"
            },
            borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            spacing: {
              "margin-desktop": "32px", "xl": "40px", "md": "16px", "base": "8px",
              "xs": "4px", "gutter": "16px", "sm": "8px", "margin-mobile": "16px", "lg": "24px"
            },
            fontFamily: { "body-sm": ["Sora"], "h2": ["Sora"], "mono-metric": ["Space Mono"], "body": ["Sora"], "h1": ["Sora"], "label-caps": ["Sora"] },
            fontSize: {
              "body-sm": ["12px", {"lineHeight":"18px","letterSpacing":"0","fontWeight":"400"}],
              "h2": ["18px", {"lineHeight":"24px","letterSpacing":"-0.01em","fontWeight":"500"}],
              "mono-metric": ["11px", {"lineHeight":"16px","letterSpacing":"0","fontWeight":"400"}],
              "body": ["13px", {"lineHeight":"20px","letterSpacing":"0","fontWeight":"400"}],
              "h1": ["22px", {"lineHeight":"28px","letterSpacing":"-0.02em","fontWeight":"500"}],
              "label-caps": ["11px", {"lineHeight":"16px","letterSpacing":"0.1em","fontWeight":"600"}]
            }
          }
        }
      }
    </script>
    <style>
      /* ═══════════════════════════════════════
         BASE
      ═══════════════════════════════════════ */
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: 'Sora', sans-serif;
        background: #F4F2EF;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        font-size: 18px;
        vertical-align: middle;
      }

      /* ═══════════════════════════════════════
         CANVAS GRID — subtil, modern
      ═══════════════════════════════════════ */
      .canvas-grid {
        background-color: #F4F2EF;
        background-image:
          linear-gradient(rgba(26,26,46,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(26,26,46,0.04) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      /* ═══════════════════════════════════════
         SCROLLBAR
      ═══════════════════════════════════════ */
      .custom-scrollbar::-webkit-scrollbar { width: 3px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #d8d5db; border-radius: 10px; }
      nav.custom-scrollbar, #elements-list, .enc-body, #enc-body {
        -webkit-overflow-scrolling: touch;
        overflow-y: auto;
        touch-action: pan-y;
      }

      /* ═══════════════════════════════════════
         SIDEBAR
      ═══════════════════════════════════════ */
      .sidebar {
        width: 200px;
        height: 100%;
        background: #FFFFFF;
        border-right: 1px solid #EAE8E5;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        box-shadow: 2px 0 12px rgba(0,0,0,0.04);
      }

      .sidebar-header {
        padding: 16px 14px 12px;
        border-bottom: 1px solid #EAE8E5;
        flex-shrink: 0;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .sidebar-brand img {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        object-fit: contain;
      }

      .sidebar-brand-text {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: #1a1a2e;
      }

      .sidebar-back {
        color: #9e9ba4;
        text-decoration: none;
        display: flex;
        align-items: center;
        margin-right: 4px;
        transition: color 0.15s;
      }
      .sidebar-back:hover { color: #1a1a2e; }

      /* Search input */
      .search-wrap {
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #b0adb6;
        pointer-events: none;
        font-size: 16px !important;
      }
      #search-input {
        width: 100%;
        height: 36px;
        background: #F4F2EF;
        border: 1px solid #E2DFE8;
        border-radius: 10px;
        padding: 0 10px 0 32px;
        font-size: 12px;
        font-family: 'Sora', sans-serif;
        color: #1c1b1d;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }
      #search-input:focus {
        border-color: #1a1a2e;
        background: #fff;
      }
      #search-input::placeholder { color: #b0adb6; }

      /* Element list */
      .elements-nav {
        flex: 1;
        overflow-y: auto;
        padding: 6px 8px;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
      }
      .elements-nav::-webkit-scrollbar { width: 3px; }
      .elements-nav::-webkit-scrollbar-thumb { background: #e2dfe8; border-radius: 3px; }

      /* Element button */
      .element-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-family: 'Sora', sans-serif;
        transition: background 0.1s;
        user-select: none;
        text-align: left;
      }
      .element-btn:hover { background: #F4F2EF; }
      .element-btn:active { background: #EAE8E5; }
      .el-emoji { font-size: 18px; line-height: 1; min-width: 22px; text-align: center; }
      .el-name  { font-size: 12px; color: #2d2b33; font-weight: 400; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .el-tier  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }

      .tier-basic   { background: #9e9ba4; }
      .tier-nature  { background: #3d9e52; }
      .tier-earth   { background: #8B5E3C; }
      .tier-life    { background: #d63a7a; }
      .tier-human   { background: #2979d6; }
      .tier-cosmic  { background: #7c3aed; }
      .tier-legend  { background: #e87c1e; }

      .element-btn--legend .el-name { color: #c4510a; font-weight: 600; }
      .element-btn--legend { background: linear-gradient(90deg, #fff9f0, transparent); }
      .element-btn--legend:hover { background: #fff3e0; }

      .no-results {
        padding: 20px 8px;
        font-size: 11px;
        color: #b0adb6;
        text-align: center;
        font-style: italic;
      }

      /* Progress footer */
      .sidebar-footer {
        padding: 10px 14px;
        border-top: 1px solid #EAE8E5;
        background: #fff;
        flex-shrink: 0;
      }
      .progress-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      #discovered-counter {
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #9e9ba4;
        font-weight: 600;
      }
      #progress-label {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        color: #1a1a2e;
        font-weight: 700;
      }
      .progress-track {
        width: 100%;
        height: 3px;
        background: #EAE8E5;
        border-radius: 999px;
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #1a1a2e, #4a4a7a);
        border-radius: 999px;
        transition: width 0.4s ease;
      }

      /* ═══════════════════════════════════════
         HEADER
      ═══════════════════════════════════════ */
      .main-header {
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(234,232,229,0.8);
        flex-shrink: 0;
        z-index: 10;
      }

      .header-title {
        font-size: 10px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: #b0adb6;
        font-weight: 600;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Header buttons */
      .hbtn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        font-family: 'Sora', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .hbtn .material-symbols-outlined { font-size: 15px !important; }

      .hbtn-primary {
        background: #1a1a2e;
        color: #fff;
        border-color: #1a1a2e;
      }
      .hbtn-primary:hover { background: #2d2b4e; border-color: #2d2b4e; }
      .hbtn-primary:active { transform: scale(0.97); }

      .hbtn-ghost {
        background: transparent;
        color: #6b6876;
        border-color: #E2DFE8;
      }
      .hbtn-ghost:hover { background: #F4F2EF; color: #1c1b1d; border-color: #c8c5cd; }
      .hbtn-ghost:active { transform: scale(0.97); }

      .hbtn-accent {
        background: #FFF8EE;
        color: #b85c00;
        border-color: #fad9aa;
      }
      .hbtn-accent:hover { background: #FFEFD4; }
      .hbtn-accent:active { transform: scale(0.97); }

      /* ═══════════════════════════════════════
         CANVAS ELEMENT — SOLO EMOJI, no circle
      ═══════════════════════════════════════ */
      .canvas-element {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: grab;
        user-select: none;
        z-index: 10;
        padding: 4px;
        /* NO background, NO border, NO shadow */
        background: transparent;
        border: none;
        border-radius: 0;
      }

      .canvas-emoji {
        font-size: 36px;
        line-height: 1;
        pointer-events: none;
        user-select: none;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
        transition: filter 0.15s, transform 0.1s;
      }

      .canvas-element:hover .canvas-emoji {
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.22));
        transform: scale(1.08);
      }

      .canvas-label {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: #5a5768;
        margin-top: 3px;
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
        text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      }

      .canvas-element.dragging {
        cursor: grabbing;
        z-index: 999;
      }
      .canvas-element.dragging .canvas-emoji {
        filter: drop-shadow(0 8px 20px rgba(0,0,0,0.28));
        transform: scale(1.15) rotate(-3deg);
      }

      /* Legend glow */
      .canvas-element--legend .canvas-emoji {
        filter: drop-shadow(0 0 8px rgba(232,124,30,0.5)) drop-shadow(0 2px 4px rgba(0,0,0,0.12));
        animation: legend-float 3s ease-in-out infinite;
      }
      @keyframes legend-float {
        0%,100% { filter: drop-shadow(0 0 6px rgba(232,124,30,0.4)) drop-shadow(0 2px 4px rgba(0,0,0,0.12)); }
        50%      { filter: drop-shadow(0 0 16px rgba(232,124,30,0.7)) drop-shadow(0 4px 8px rgba(0,0,0,0.12)); }
      }

      /* Pop-in */
      @keyframes pop-in {
        0%   { opacity: 0; transform: scale(0.2) rotate(-10deg); }
        60%  { opacity: 1; transform: scale(1.18) rotate(2deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      .canvas-element.popping { animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }

      /* Shake */
      @keyframes shake {
        0%,100% { transform: translate(0,0) rotate(0); }
        20% { transform: translate(-5px,-2px) rotate(-5deg); }
        40% { transform: translate(5px,2px) rotate(5deg); }
        60% { transform: translate(-4px,3px) rotate(-3deg); }
        80% { transform: translate(4px,-3px) rotate(3deg); }
      }
      .canvas-element.shaking { animation: shake 0.3s ease-in-out; }

      /* Particles */
      @keyframes particle-fly {
        0%   { opacity: 1; transform: translate(0,0) scale(1); }
        100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.1); }
      }
      .ws-particle {
        position: absolute;
        font-size: 15px;
        pointer-events: none;
        z-index: 500;
        animation: particle-fly 0.75s ease-out forwards;
      }

      /* Workspace hint */
      #workspace-hint {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        pointer-events: none;
        opacity: 0.25;
      }
      #workspace-hint.hidden { display: none; }
      .hint-icon-big { font-size: 48px; opacity: 0.6; }
      .hint-text-big {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #5a5768;
        font-weight: 600;
      }

      /* ═══════════════════════════════════════
         TOAST
      ═══════════════════════════════════════ */
      #toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(26,26,46,0.95);
        color: #fff;
        padding: 9px 20px;
        border-radius: 999px;
        font-size: 12px;
        font-family: 'Sora', sans-serif;
        font-weight: 500;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
        z-index: 9999;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        white-space: nowrap;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* ═══════════════════════════════════════
         DISCOVERY OVERLAY
      ═══════════════════════════════════════ */
      #discovery-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10,8,20,0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 9000;
        align-items: center;
        justify-content: center;
      }
      #discovery-overlay.open { display: flex; }

      .disc-card {
        background: #fff;
        border-radius: 24px;
        padding: 44px 56px;
        text-align: center;
        position: relative;
        overflow: hidden;
        max-width: 380px;
        width: 92%;
        box-shadow: 0 32px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
        animation: card-in 0.45s cubic-bezier(0.34,1.56,0.64,1);
      }
      .disc-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #1a1a2e, #6c5ce7, #1a1a2e);
      }

      @keyframes card-in {
        from { opacity: 0; transform: scale(0.5) translateY(40px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      .disc-badge {
        display: inline-block;
        font-size: 9px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #6c5ce7;
        font-weight: 700;
        background: #f0eeff;
        padding: 4px 12px;
        border-radius: 999px;
        margin-bottom: 18px;
      }
      .disc-big-emoji {
        font-size: 88px;
        line-height: 1;
        margin: 0 0 20px;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
      }
      .disc-name {
        font-size: 28px;
        font-weight: 800;
        color: #1c1b1d;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .disc-desc {
        font-size: 13px;
        color: #7a7785;
        margin-bottom: 28px;
        line-height: 1.7;
      }
      .disc-btn {
        padding: 12px 36px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 13px;
        font-family: 'Sora', sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s, transform 0.15s;
        letter-spacing: 0.3px;
      }
      .disc-btn:hover { background: #2d2b4e; transform: scale(1.02); }

      @keyframes confetti-fly {
        0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
        100% { opacity: 0; transform: translate(var(--dx),var(--dy)) scale(0.1) rotate(180deg); }
      }
      .confetti-p {
        position: absolute;
        font-size: 20px;
        pointer-events: none;
        animation: confetti-fly 1.1s ease-out forwards;
      }

      /* ═══════════════════════════════════════
         ENCYCLOPEDIA MODAL
      ═══════════════════════════════════════ */
      #encyclopedia-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10,8,20,0.5);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 8000;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      #encyclopedia-modal.open { display: flex; }

      .enc-window {
        background: #fff;
        width: 640px;
        max-width: 100%;
        height: 560px;
        max-height: 90vh;
        border-radius: 20px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.04);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: card-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
      }

      .enc-top-bar {
        background: #FAFAFA;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #EEECEA;
        flex-shrink: 0;
        height: 52px;
      }

      .enc-tabs-row { display: flex; gap: 2px; }

      .enc-tab-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 12px;
        border-radius: 8px;
        border: none;
        background: transparent;
        font-family: 'Sora', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #9e9ba4;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
      }
      .enc-tab-btn:hover { color: #1c1b1d; background: #F4F2EF; }
      .enc-tab-btn.active {
        color: #1a1a2e;
        font-weight: 700;
        background: #F4F2EF;
      }
      .enc-tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 8px; right: 8px;
        height: 2px;
        background: #1a1a2e;
        border-radius: 999px;
      }
      .enc-tab-btn .material-symbols-outlined { font-size: 15px !important; }

      .enc-close-btn {
        background: #F4F2EF;
        border: none;
        cursor: pointer;
        width: 28px; height: 28px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        color: #9e9ba4;
        font-size: 14px;
        transition: all 0.15s;
      }
      .enc-close-btn:hover { background: #EAE8E5; color: #1c1b1d; }

      .enc-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #FAFAFA;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
      }
      .enc-body::-webkit-scrollbar { width: 3px; }
      .enc-body::-webkit-scrollbar-thumb { background: #e2dfe8; border-radius: 3px; }

      /* Home tab */
      .enc-home-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        gap: 16px;
        padding: 8px 0;
      }

      .enc-home-icon {
        width: 72px; height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, #1a1a2e 0%, #3d3d7a 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(26,26,46,0.3);
      }
      .enc-home-icon .material-symbols-outlined { font-size: 34px !important; color: #fff; }

      .enc-big-stat {
        font-size: 44px;
        font-weight: 800;
        color: #1c1b1d;
        letter-spacing: -2px;
        line-height: 1;
      }
      .enc-stat-sub {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #9e9ba4;
        font-weight: 600;
        margin-top: 4px;
      }

      .enc-prog-track {
        width: 260px; height: 8px;
        background: #EAE8E5;
        border-radius: 999px;
        overflow: hidden;
      }
      .enc-prog-fill {
        height: 100%;
        background: linear-gradient(90deg, #1a1a2e, #6c5ce7);
        border-radius: 999px;
        transition: width 0.6s ease;
      }
      .enc-prog-label {
        font-size: 11px;
        color: #9e9ba4;
        font-weight: 600;
        margin-top: 4px;
      }

      /* Items tab */
      .enc-section-title {
        font-size: 9px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: #b0adb6;
        font-weight: 700;
        margin-bottom: 10px;
        margin-top: 4px;
      }

      .enc-items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
        gap: 7px;
      }

      .enc-item-card {
        border-radius: 12px;
        border: 1.5px solid #EEECEA;
        padding: 10px 6px 8px;
        text-align: center;
        background: #fff;
        transition: border-color 0.12s, transform 0.1s, box-shadow 0.12s;
      }
      .enc-item-card.found { cursor: pointer; }
      .enc-item-card.found:hover {
        border-color: #1a1a2e;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(26,26,46,0.1);
      }
      .enc-item-card.locked { opacity: 0.35; background: #F4F2EF; }
      .enc-item-emoji { font-size: 26px; margin-bottom: 4px; line-height: 1; }
      .enc-item-name  { font-size: 9px; color: #2d2b33; line-height: 1.3; font-weight: 600; }
      .enc-item-desc  { font-size: 8px; color: #9e9ba4; margin-top: 2px; line-height: 1.3; display: none; }
      .enc-item-card.found:hover .enc-item-desc { display: block; }

      /* Achievements */
      .enc-ach-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
        gap: 6px;
        margin-top: 8px;
      }
      .enc-ach-card {
        border-radius: 12px;
        border: 1.5px solid #EEECEA;
        padding: 10px 4px 8px;
        text-align: center;
        background: #fff;
        transition: transform 0.1s;
      }
      .enc-ach-card.ach-unlocked {
        border-color: #1a1a2e;
        background: linear-gradient(135deg, #f8f8ff, #fff);
        box-shadow: 0 2px 8px rgba(26,26,46,0.08);
      }
      .enc-ach-card.ach-unlocked:hover { transform: scale(1.05); }
      .enc-ach-card.ach-locked { opacity: 0.35; background: #F4F2EF; }
      .enc-ach-emoji { font-size: 22px; margin-bottom: 4px; }
      .enc-ach-name  { font-size: 8px; color: #2d2b33; line-height: 1.2; font-weight: 600; }
    </style>
</head>
<body>
<div style="display:flex; height:100vh; width:100vw; overflow:hidden;">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <a href="index.html" class="sidebar-back">
          <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span>
        </a>
        <img src="Meld.png" alt="MELD" onerror="this.style.display='none'"/>
        <span class="sidebar-brand-text">MELD</span>
      </div>
      <div class="search-wrap">
        <span class="material-symbols-outlined search-icon">search</span>
        <input
          id="search-input"
          type="text"
          placeholder="Caută element..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <nav class="elements-nav">
      <div id="elements-list"></div>
    </nav>

    <div class="sidebar-footer">
      <div class="progress-row">
        <span id="discovered-counter">4 / 0</span>
        <span id="progress-label">0%</span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main style="flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative;">

    <!-- Header -->
    <header class="main-header">
      <span class="header-title">Tablă de Lucru</span>
      <div class="header-actions">
        <button id="enc-btn" class="hbtn hbtn-primary">
          <span class="material-symbols-outlined">menu_book</span>
          Enciclopedie
        </button>
        <button id="hint-btn" class="hbtn hbtn-accent">
          <span class="material-symbols-outlined">lightbulb</span>
          <span class="hint-label">Indiciu</span>
        </button>
        <button id="clear-btn" class="hbtn hbtn-ghost">
          <span class="material-symbols-outlined">delete</span>
          Curăță
        </button>
      </div>
    </header>

    <!-- Canvas -->
    <div class="canvas-grid" style="flex:1; position:relative; overflow:hidden;" id="workspace">
      <div id="workspace-hint">
        <span class="hint-icon-big">⚗️</span>
        <span class="hint-text-big">Trage elemente pe tablă</span>
      </div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- DISCOVERY OVERLAY -->
<div id="discovery-overlay">
  <div class="disc-card">
    <div class="disc-badge" id="disc-badge">✦ Element Nou Descoperit ✦</div>
    <div class="disc-big-emoji" id="disc-emoji">✨</div>
    <div class="disc-name" id="disc-name"></div>
    <div class="disc-desc" id="disc-desc"></div>
    <button class="disc-btn" id="disc-continue-btn">Continuă ✦</button>
  </div>
</div>

<!-- ENCYCLOPEDIA MODAL -->
<div id="encyclopedia-modal">
  <div class="enc-window">
    <div class="enc-top-bar">
      <div class="enc-tabs-row">
        <button class="enc-tab-btn active" data-enc-tab="home">
          <span class="material-symbols-outlined">analytics</span> Statistici
        </button>
        <button class="enc-tab-btn" data-enc-tab="items">
          <span class="material-symbols-outlined">auto_awesome</span> Elemente
        </button>
      </div>
      <button class="enc-close-btn" id="enc-close-btn">✕</button>
    </div>
    <div class="enc-body" id="enc-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
